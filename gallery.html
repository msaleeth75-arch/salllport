  <style>
    .gallery-section { padding-top: 150px; }
    
    .masonry-grid {
      column-count: 3;
      column-gap: 20px;
    }
    
    .gallery-item {
      margin-bottom: 20px;
      break-inside: avoid;
      position: relative;
      border-radius: 15px;
      overflow: hidden;
      cursor: pointer;
    }

    .gallery-img {
      width: 100%;
      display: block;
      transition: transform 0.8s ease;
      background: #111;
    }
    
    /* Simulate Masonry Images Heights */
    .g-img-1 { height: 300px; background: url('https://via.placeholder.com/600x600/111/d4af37?text=Events') center/cover; }
    .g-img-2 { height: 450px; background: url('https://via.placeholder.com/600x900/111/d4af37?text=Leadership') center/cover; }
    .g-img-3 { height: 250px; background: url('https://via.placeholder.com/600x500/111/d4af37?text=Business') center/cover; }
    .g-img-4 { height: 400px; background: url('https://via.placeholder.com/600x800/111/d4af37?text=Awards') center/cover; }
    .g-img-5 { height: 300px; background: url('https://via.placeholder.com/600x600/111/d4af37?text=NetMelt') center/cover; }
    .g-img-6 { height: 450px; background: url('https://via.placeholder.com/600x900/111/d4af37?text=Meetings') center/cover; }

    .gallery-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      opacity: 0;
      transition: all 0.4s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gallery-item:hover .gallery-img { transform: scale(1.05); }
    .gallery-item:hover .gallery-overlay { opacity: 1; }
    
    .gallery-icon {
      width: 40px; height: 40px;
      fill: var(--gold-primary);
      transform: scale(0);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .gallery-item:hover .gallery-icon { transform: scale(1); }

    @media screen and (max-width: 900px) { .masonry-grid { column-count: 2; } }
    @media screen and (max-width: 600px) { .masonry-grid { column-count: 1; } }

    /* Lightbox */
    .lightbox {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 10000;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }
    .lightbox.active { display: flex; }
    .lightbox-img {
      max-width: 90%; max-height: 90%;
      border: 2px solid var(--gold-primary);
      box-shadow: 0 0 50px rgba(212,175,55,0.2);
    }
    .lightbox-close {
      position: absolute;
      top: 30px; right: 40px;
      font-size: 3rem;
      color: var(--text-primary);
      cursor: pointer;
      line-height: 1;
    }
  </style>
</head>

  <script>
    function openLightbox(className) {
      const lb = document.getElementById('lightbox');
      const lbImg = document.getElementById('lightbox-img');
      // For placeholder, extract URL from background or set generic
      lbImg.src = 'https://via.placeholder.com/1200x800/111/d4af37?text=Full+Image';
      lb.classList.add('active');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }
